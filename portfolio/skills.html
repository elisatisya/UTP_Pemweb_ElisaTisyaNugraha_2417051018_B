    <a href="projects.html">Portfolio</a>

  <!-- SKILLS -->
  <section id="skills" style="padding-top:65px; background:var(--bg);">

    <div class="section-wrap">

      <!-- TITLE -->
      <div class="section-heading">My <span>Skills</span></div>

      <!-- SKILL BARS -->
      <div id="skillBarsContainer">

        <div class="skill-bar-item">
          <div class="skill-bar-label">
            <span>FIGMA</span><span>70%</span>
          </div>
          <div class="skill-bar-track">
            <div class="skill-bar-fill" data-pct="80"></div>
          </div>
        </div>

        <div class="skill-bar-item">
          <div class="skill-bar-label">
            <span>HTML</span><span>68%</span>
          </div>
          <div class="skill-bar-track">
            <div class="skill-bar-fill" data-pct="85"></div>
          </div>
        </div>

        <div class="skill-bar-item">
          <div class="skill-bar-label">
            <span>CPP</span><span>65%</span>
          </div>
          <div class="skill-bar-track">
            <div class="skill-bar-fill" data-pct="78"></div>
          </div>
        </div>

        <div class="skill-bar-item">
          <div class="skill-bar-label">
            <span>JAVA</span><span>55%</span>
          </div>
          <div class="skill-bar-track">
            <div class="skill-bar-fill" data-pct="70"></div>
          </div>
        </div>

        <div class="skill-bar-item">
          <div class="skill-bar-label">
            <span>PYTHON</span><span>50%</span>
          </div>
          <div class="skill-bar-track">
            <div class="skill-bar-fill" data-pct="72"></div>
          </div>
        </div>

      </div>

      <!-- TOOLS -->
      <div style="margin-top:4rem;">
        <div class="section-heading">My <span>Tools</span></div>

        <div class="tools-grid">

          <div class="tool-card">
            <span class="tool-emoji">🎨</span>
            <div class="tool-name">Figma</div>
            <div class="tool-cat">Design</div>
          </div>

          <div class="tool-card">
            <span class="tool-emoji">⌨️</span>
            <div class="tool-name">VS Code</div>
            <div class="tool-cat">Editor</div>
          </div>

          <div class="tool-card">
            <span class="tool-emoji">🐙</span>
            <div class="tool-name">GitHub</div>
            <div class="tool-cat">Version Control</div>
          </div>

          <div class="tool-card">
            <span class="tool-emoji">🖥️</span>
            <div class="tool-name">Android</div>
            <div class="tool-cat">Studio</div>
          </div>

        </div>
      </div>

    </div>
  </section>
